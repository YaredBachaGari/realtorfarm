name: Daily distressed-property collection

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 7 AM Pacific (UTC-7), Mon–Fri
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (use 30 for initial backfill)"
        default: "1"
        required: false
      city:
        description: "Single city to run (blank = all three)"
        default: ""
        required: false

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        city: [burien, kent, tukwila]
      fail-fast: false
      max-parallel: 1   # prevent concurrent git push races on the same branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Collect records
        if: ${{ github.event_name == 'schedule' || github.event.inputs.city == '' || github.event.inputs.city == matrix.city }}
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          BROWSER_USE_API_KEY: ${{ secrets.BROWSER_USE_API_KEY }}
          BROWSER_USE_MAX_ENRICHMENTS: ${{ vars.BROWSER_USE_MAX_ENRICHMENTS || '10' }}
          RECORDER_DIRECT_ENABLED: ${{ vars.RECORDER_DIRECT_ENABLED || 'false' }}
          COURTS_ENABLED: ${{ vars.COURTS_ENABLED || 'false' }}
          REO_ENABLED: ${{ vars.REO_ENABLED || 'false' }}
          REO_BROWSER_USE_MAX_TASKS: ${{ vars.REO_BROWSER_USE_MAX_TASKS || '6' }}
          BANKRUPTCY_ENABLED: ${{ vars.BANKRUPTCY_ENABLED || 'false' }}
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
        run: |
          python scripts/collect_daily.py \
            --city ${{ matrix.city }} \
            --lookback-days ${{ github.event.inputs.lookback_days || '1' }}

      - name: Score and upload
        if: ${{ github.event_name == 'schedule' || github.event.inputs.city == '' || github.event.inputs.city == matrix.city }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          python scripts/run_daily.py \
            --city ${{ matrix.city }} \
            --upload-blob

      - name: Commit updated merged.csv
        if: ${{ github.event_name == 'schedule' || github.event.inputs.city == '' || github.event.inputs.city == matrix.city }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cities/${{ matrix.city }}/daily/merged.csv
          git diff --cached --quiet || git commit -m "chore: daily collection ${{ matrix.city }} $(date -u +%Y-%m-%d)"
          git pull --rebase origin ${{ github.ref_name }} && git push
